# ──────────────────────────────────────────────────────────────
# Smart Solution Dashboard — Nginx 리버스 프록시 설정
#
# [배포 전 반드시 수정]
#   1. server_name → 실제 서버 IP 또는 도메인 입력
#   2. SSL 인증서 경로 확인 (self-signed 생성 방법 아래 참고)
#
# [Self-signed 인증서 생성]
#   sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/ssl/private/smartsolution.key \
#     -out /etc/ssl/certs/smartsolution.crt
#
# [심볼릭 링크 등록]
#   sudo ln -s /etc/nginx/sites-available/smartsolution \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl restart nginx
# ──────────────────────────────────────────────────────────────

# HTTP → HTTPS 강제 리다이렉트
server {
    listen 80;
    server_name YOUR_SERVER_IP_OR_DOMAIN;   # ← 여기 수정

    return 301 https://$host$request_uri;
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    server_name YOUR_SERVER_IP_OR_DOMAIN;   # ← 여기 수정

    ssl_certificate     /etc/ssl/certs/smartsolution.crt;
    ssl_certificate_key /etc/ssl/private/smartsolution.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 보안 헤더
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy        "same-origin"   always;

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
