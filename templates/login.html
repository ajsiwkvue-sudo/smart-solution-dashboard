<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인 — 스마트솔루션 민원</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Arial', sans-serif;
      background: linear-gradient(135deg, #e8f5e9 0%, #e3f2fd 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #4CAF50, #43A047);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(76,175,80,.3);
      font-size: 28px;
    }
    .logo h1 { font-size: 20px; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
    .logo p  { font-size: 13px; color: #aaa; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      font-size: 12px; font-weight: 700; color: #666;
      display: block; margin-bottom: 6px;
    }
    .form-control {
      width: 100%; padding: 13px 16px;
      border: 1.5px solid #e8e8e8; border-radius: 12px;
      font-size: 14px; color: #333; background: #fafafa;
      outline: none; font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus {
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px rgba(76,175,80,.12);
      background: white;
    }

    .info-box {
      background: #e8f4fd;
      border: 1px solid #90caf9;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 700;
      color: #1565c0;
      margin-bottom: 16px;
      line-height: 1.7;
    }

    .error-box {
      background: #fce4ec;
      border: 1px solid #f48fb1;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #c62828;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #4CAF50, #43A047);
      color: white; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 16px rgba(76,175,80,.3);
      transition: all .2s; margin-top: 8px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76,175,80,.4); }
    .btn-login:active { transform: none; }

    .hint {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #bbb;
      line-height: 1.8;
    }
    .hint strong { color: #999; }
  </style>
</head>
<body>
<div class="card">

  <div class="logo">
    <div class="logo-icon">🏥</div>
    <h1>스마트솔루션 민원</h1>
    <p>병동 계정으로 로그인하세요</p>
  </div>

  

  {% if error %}
  <div class="error-box">
    ⚠️ {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="form-group">
      <label class="form-label">아이디 (사번 또는 병동명)</label>
      <input type="text" name="username" class="form-control"
             placeholder="예: N2024001, 3내과, admin"
             autofocus autocomplete="username" required>
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input type="password" name="password" class="form-control"
             placeholder="비밀번호 입력"
             autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">로그인 →</button>
  </form>

  <div class="hint">
    계정이 없으시면 운영팀에 문의해주세요
  </div>

</div>
</body>
</html>
